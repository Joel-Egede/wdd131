<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Responsive Images Activity">
    <meta name="author" content="Iloabuchi Egede">

    <title>Responsive Images | WDD 131</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="styles/responsive-images.css">
</head>

<body>

<header>
    <h1>Responsive Images</h1>
</header>

<main>

<div class="hero">

<picture>

    <source
        srcset="images/hero-large.webp"
        media="(min-width:1000px)">

    <source
        srcset="images/hero-medium.webp"
        media="(min-width:500px)">

    <img
        src="images/hero-small.webp"
        alt="Temple surrounded by beautiful landscape"
        width="1500"
        height="750">

</picture>

</div>

</main>

<footer>
    <p>&copy; 2026 Iloabuchi Egede</p>
</footer>

</body>
</html>
